<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMT 團隊合盤報告產生器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B1A3E;
    --gold: #C9A84C;
    --gold-light: #F0D98A;
    --wind: #1D9E75;
    --fire: #D85A30;
    --water: #3B8BDB;
    --earth: #BA7517;
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F1EFE8;
    --border: rgba(0,0,0,0.10);
    --border-md: rgba(0,0,0,0.18);
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --text-hint: #9A9A9A;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── API Key Gate ── */
  .gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--navy);
  }
  .gate-card {
    background: #fff;
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .gate-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .gate-logo-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate-title { font-size: 20px; font-weight: 600; color: var(--navy); }
  .gate-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .gate-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 1.25rem; line-height: 1.7; }
  .gate-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .gate-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border-md);
    border-radius: 8px;
    font-size: 14px;
    font-family: monospace;
    margin-bottom: 1rem;
    color: var(--text);
    background: #fff;
  }
  .gate-input:focus { outline: none; border-color: var(--navy); }
  .gate-btn {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .gate-btn:hover { opacity: .88; }
  .gate-note {
    margin-top: 1rem;
    font-size: 11px;
    color: var(--text-hint);
    text-align: center;
    line-height: 1.6;
  }
  .gate-note a { color: var(--water); }

  /* ── App Shell ── */
  #app { display: none; }
  .topbar {
    background: var(--navy);
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .topbar-l { display: flex; align-items: center; gap: 12px; }
  .topbar-logo {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(201,168,76,.15);
    border: 1px solid rgba(201,168,76,.4);
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--gold); }
  .topbar-sub { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }
  .topbar-r { display: flex; align-items: center; gap: 10px; }
  .key-badge {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: rgba(255,255,255,.6);
    cursor: pointer;
  }
  .key-badge:hover { background: rgba(255,255,255,.14); }

  /* ── Layout ── */
  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* ── Step Indicator ── */
  .step-bar {
    display: flex;
    gap: 3px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 1.25rem;
  }
  .step-btn {
    flex: 1;
    padding: 9px 6px;
    text-align: center;
    font-size: 12px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: .15s;
    font-family: inherit;
  }
  .step-btn.active {
    background: var(--navy);
    color: #fff;
    font-weight: 600;
  }
  .step-btn.done { color: var(--wind); }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1rem;
  }

  /* ── Context Row ── */
  .ctx-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .ctx-group { flex: 1; min-width: 200px; }
  .ctx-group label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 5px; }
  .ctx-group input, .ctx-group select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border-md);
    border-radius: 7px;
    font-size: 13px;
    color: var(--text);
    background: #fff;
    font-family: inherit;
  }
  .ctx-group input:focus, .ctx-group select:focus { outline: none; border-color: var(--navy); }

  /* ── Member Grid ── */
  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    margin-bottom: 1rem;
  }
  .member-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    position: relative;
    transition: border-color .2s;
  }
  .member-card.filled { border-color: var(--gold); }
  .mc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .75rem;
  }
  .mc-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .mc-remove {
    background: none; border: none;
    font-size: 16px; cursor: pointer;
    color: var(--text-hint);
    padding: 2px 5px;
    border-radius: 4px;
    line-height: 1;
  }
  .mc-remove:hover { color: var(--fire); background: #FAECE7; }
  .mc-field {
    width: 100%;
    padding: 7px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    background: #fff;
    margin-bottom: 6px;
    font-family: inherit;
  }
  .mc-field:focus { outline: none; border-color: var(--navy); }
  .mc-preview {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 7px;
    font-size: 11px;
    color: var(--text-muted);
    display: none;
  }
  .mc-preview.show { display: block; }
  .ebar { display: flex; align-items: center; gap: 5px; margin: 3px 0; }
  .el { font-size: 10px; width: 24px; color: var(--text-muted); }
  .et { flex: 1; height: 6px; background: rgba(0,0,0,.07); border-radius: 3px; overflow: hidden; }
  .ef { height: 100%; border-radius: 3px; }
  .ep { font-size: 10px; width: 28px; text-align: right; color: var(--text-muted); }

  .add-slot {
    background: #fff;
    border: 1px dashed var(--border-md);
    border-radius: var(--radius);
    min-height: 200px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: .15s;
    flex-direction: column;
    gap: 6px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .add-slot:hover { border-color: var(--gold); color: var(--text); background: #FAFAF8; }
  .add-slot-icon { font-size: 24px; color: var(--gold); }

  /* ── Chips ── */
  .chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    margin: 1px;
  }
  .chip-gift { background: var(--navy); color: var(--gold); }
  .chip-mentor { background: #185FA5; color: #fff; }
  .chip-shadow { background: #7A2020; color: #fff; }
  .chip-year { background: #0A5C3C; color: #fff; }
  .chip-wind { background: #E1F5EE; color: #0F6E56; }
  .chip-fire { background: #FAECE7; color: #993C1D; }
  .chip-water { background: #E6F1FB; color: #185FA5; }
  .chip-earth { background: #FAEEDA; color: #854F0B; }

  /* ── Generate Button ── */
  .gen-btn {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    transition: opacity .15s;
    font-family: inherit;
  }
  .gen-btn:hover:not(:disabled) { opacity: .88; }
  .gen-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── Report ── */
  .report-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .report-header {
    background: var(--navy);
    padding: 1.5rem;
  }
  .rh-title { color: var(--gold); font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .rh-sub { color: rgba(255,255,255,.55); font-size: 12px; }
  .rh-members { display: flex; flex-wrap: wrap; gap: 7px; margin-top: .9rem; }
  .rh-chip {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 20px;
    padding: 4px 13px;
    font-size: 12px;
    color: #fff;
  }
  .report-body { padding: 1.5rem; }

  /* Member overview */
  .member-overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .mov-card {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 1rem;
    border-left: 3px solid var(--gold);
  }
  .mov-header { display: flex; align-items: center; gap: 9px; margin-bottom: .6rem; }
  .mov-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .mov-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .mov-role { font-size: 10px; color: var(--text-muted); }

  /* Sections */
  .r-section { margin-bottom: 1.75rem; }
  .r-section:last-child { margin-bottom: 0; }
  .r-sec-header {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 1rem;
    padding-bottom: .5rem;
    border-bottom: 2px solid var(--gold);
  }
  .r-sec-icon {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--gold);
    flex-shrink: 0;
    font-weight: 700;
  }
  .r-sec-title { font-size: 14px; font-weight: 700; color: var(--text); }

  .syn-block {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 10px;
  }
  .syn-content {
    font-size: 13px;
    color: var(--text);
    line-height: 1.85;
    white-space: pre-wrap;
  }
  .syn-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
    gap: 6px;
  }
  .edit-btn {
    background: none;
    border: 1px solid var(--border-md);
    border-radius: 5px;
    padding: 3px 10px;
    font-size: 11px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
  }
  .edit-btn:hover { border-color: var(--navy); color: var(--navy); }
  .edit-textarea {
    width: 100%;
    min-height: 120px;
    padding: 10px;
    border: 1px solid var(--border-md);
    border-radius: 7px;
    font-size: 13px;
    line-height: 1.8;
    resize: vertical;
    font-family: inherit;
    color: var(--text);
    background: #fff;
  }
  .save-btn {
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
  }

  .action-row {
    display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    background: #fff;
    border: 1px solid var(--border-md);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    transition: .15s;
  }
  .action-btn:hover { border-color: var(--navy); }
  .action-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
  .action-btn.primary:hover { opacity: .88; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 13px;
  }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    background: #FAECE7;
    border: 1px solid #F0997B;
    border-radius: var(--radius);
    padding: 1rem;
    color: #993C1D;
    font-size: 13px;
    line-height: 1.7;
  }

  /* Print */
  @media print {
    .topbar, .step-bar, .action-row, .edit-btn, .syn-footer { display: none !important; }
    body { background: #fff; }
    .report-header { background: var(--navy) !important; -webkit-print-color-adjust: exact; }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .member-grid { grid-template-columns: 1fr; }
    .ctx-row { flex-direction: column; }
    .topbar-sub { display: none; }
  }
</style>
</head>
<body>

<!-- API Key Gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-logo">
      <div class="gate-logo-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="10" stroke="#C9A84C" stroke-width="1.5"/>
          <path d="M8 13L13 8L18 13L13 18Z" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
          <circle cx="13" cy="13" r="2.5" fill="#C9A84C"/>
        </svg>
      </div>
      <div>
        <div class="gate-title">MMT 合盤報告產生器</div>
        <div class="gate-sub">Mercury Mental Thinking</div>
      </div>
    </div>
    <p class="gate-desc">
      此工具使用 Claude AI 即時生成 MMT 天賦合盤分析報告。<br>
      請輸入你的 Anthropic API Key 開始使用。<br>
      Key 僅存於瀏覽器本地，不會上傳至任何伺服器。
    </p>
    <label class="gate-label">Anthropic API Key</label>
    <input type="password" class="gate-input" id="api-key-input"
           placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="gate-btn" onclick="startApp()">進入工具</button>
    <p class="gate-note">
      還沒有 API Key？前往
      <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>
      申請。<br>
      本工具不收集任何個人資料。
    </p>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-l">
      <div class="topbar-logo">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" stroke="#C9A84C" stroke-width="1.3"/>
          <path d="M7 11L11 7L15 11L11 15Z" stroke="#C9A84C" stroke-width="1.1" fill="none"/>
          <circle cx="11" cy="11" r="2.2" fill="#C9A84C"/>
        </svg>
      </div>
      <div>
        <div class="topbar-title">MMT 合盤報告產生器</div>
        <div class="topbar-sub">Mercury Mental Thinking</div>
      </div>
    </div>
    <div class="topbar-r">
      <div class="key-badge" onclick="changeKey()" title="更換 API Key">🔑 API Key 已設定</div>
    </div>
  </div>

  <div class="container">
    <div class="step-bar">
      <button class="step-btn active" id="stp1" onclick="goStep(1)">① 輸入成員資料</button>
      <button class="step-btn" id="stp2">② 查看合盤報告</button>
    </div>

    <!-- Step 1 -->
    <div id="step1">
      <div class="card">
        <div class="card-title">分析情境設定</div>
        <div class="ctx-row">
          <div class="ctx-group">
            <label>團隊名稱 / 情境描述</label>
            <input type="text" id="ctx-name" placeholder="例：業務三人組、2026核心團隊">
          </div>
          <div class="ctx-group">
            <label>分析目的</label>
            <select id="ctx-purpose">
              <option>商業團隊協作</option>
              <option>職場分工建議</option>
              <option>合夥人評估</option>
              <option>人際關係解析</option>
              <option>親子/家庭關係</option>
              <option>情感關係分析</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">成員資料輸入（2–6 人）</div>
        <div class="member-grid" id="member-grid"></div>
      </div>

      <button class="gen-btn" id="gen-btn" onclick="generateReport()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1L10 6H15L11 9.5L12.5 15L8 12L3.5 15L5 9.5L1 6H6Z" fill="white"/>
        </svg>
        <span id="gen-btn-text">請至少填入 2 位成員資料</span>
      </button>
    </div>

    <!-- Step 2 -->
    <div id="step2" style="display:none">
      <div class="report-wrap" id="report-area">
        <div class="loading">
          <div class="loading-spinner"></div>
          AI 正在分析天賦資料，生成合盤報告…
        </div>
      </div>
      <div class="action-row">
        <button class="action-btn" onclick="goStep(1)">← 返回修改</button>
        <button class="action-btn" onclick="generateReport()">↺ 重新生成</button>
        <button class="action-btn" onclick="window.print()">🖨 列印 / 存 PDF</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ──
const CARD_NAMES = {
  0:"創意家",1:"整合者",2:"敏銳者",3:"美學家",4:"挑戰者",5:"傳教者",
  6:"演繹家",7:"守護者",8:"啟導者",9:"穿透者",10:"顯化者",11:"權威者",
  12:"趨勢家",13:"改革者",14:"使命家",15:"策略家",16:"執行者",17:"理想家",
  18:"感知者",19:"光之子",20:"計畫者",21:"建構者"
};
const CARD_ENERGY = {
  0:"wind",1:"wind",2:"water",3:"water",4:"fire",5:"earth",6:"wind",7:"water",
  8:"fire",9:"earth",10:"earth",11:"wind",12:"water",13:"water",14:"fire",
  15:"water",16:"fire",17:"wind",18:"water",19:"fire",20:"wind",21:"earth"
};
const EC = { wind:"#1D9E75", fire:"#D85A30", water:"#3B8BDB", earth:"#BA7517" };
const EN = { wind:"風", fire:"火", water:"水", earth:"土" };
const ENAME = { wind:"風能量", fire:"火能量", water:"水能量", earth:"土能量" };
const ETAG_CLASS = { wind:"chip-wind", fire:"chip-fire", water:"chip-water", earth:"chip-earth" };

const CARD_DESC = {
  0:"創新靈感、突破框架，天生重新定義價值的能力",
  1:"知識整合、商業橋樑，系統性連結資源與資訊",
  2:"高度敏銳、情感深刻，察覺細微訊號建立深度連結",
  3:"美感卓越、社群號召力強，打造品牌形象吸引目光",
  4:"衝鋒領導、強烈企圖心，推動者激發團隊突破",
  5:"說服力強、傳遞價值，金錢能量與溝通天賦兼備",

  7:"細膩守護、高忠誠度，團隊安全感與秩序的來源",

  11:"優雅權威、冷靜思辨，品味與專業並重的決策者",
  12:"趨勢敏銳、美學導演，創造舞台讓他人發光",
  13:"深度革新、敢愛敢恨，推動顛覆性變革的改革先鋒",
  14:"故事引領、使命感強，啟發他人找到方向的引路人",
  15:"策略縝密、風險嗅覺敏銳，計劃與行動的統籌者",
  16:"執行到位、業績推進者，將目標轉化為具體成果",
  17:"理想主義、媒合智慧，看見他人優勢並搭建橋樑",
  18:"直覺深邃、情感豐沛，連結無形能量與人心深處",
  19:"光芒四射、被授權感強，天生舞台中心與領袖魅力",
  20:"精準計劃、風險管控，可靠且責任感強的守衛者",
  21:"結構建立、穩定傳承，打造可持續組織架構的建構者"
};

const ROLES = [
  "","CEO/創辦人","共同創辦人","業務主管","行銷主管","營運主管",
  "財務主管","人資主管","產品主管","技術主管","顧問","合夥人",
  "員工","家人","朋友","其他"
];

// ── State ──
let API_KEY = "";
let members = [];
const MAX_MEMBERS = 6;

// ── Calc ──
function reduceN(n) {
  if (n === 0) return 0;
  while (n > 21) {
    let s = 0;
    String(n).split('').forEach(d => s += parseInt(d));
    n = s;
  }
  return n;
}

function calcCards(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDate(), month = d.getMonth() + 1, year = d.getFullYear();
  const gift = reduceN(day);
  const mentorSum = String(year).split('').reduce((a, b) => a + parseInt(b), 0) + month + day;
  const mentor = reduceN(mentorSum);
  const shadow = reduceN(gift + mentor);
  const now = new Date();
  const ys = reduceN(now.getFullYear() + month + day);
  // Weighted energies
  const energies = { wind: 0, fire: 0, water: 0, earth: 0 };
  [[gift, 40], [mentor, 35], [shadow, 25]].forEach(([n, w]) => {
    const e = CARD_ENERGY[n] || 'wind';
    energies[e] += w;
  });
  return { gift, mentor, shadow, yearStrategy: ys, energies };
}

function domEnergy(energies) {
  return Object.keys(energies).reduce((a, b) => energies[a] > energies[b] ? a : b);
}

// ── API Key Gate ──
function startApp() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('請輸入有效的 Anthropic API Key（以 sk-ant- 開頭）');
    return;
  }
  API_KEY = key;
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  // Init members
  members = [
    { name: '', date: '', role: '', cards: null },
    { name: '', date: '', role: '', cards: null }
  ];
  renderGrid();
}

function changeKey() {
  if (confirm('確定要更換 API Key 嗎？')) {
    document.getElementById('api-key-input').value = '';
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    API_KEY = '';
  }
}

// Allow Enter key on API input
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('api-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startApp();
  });
});

// ── Grid ──
function renderGrid() {
  const grid = document.getElementById('member-grid');
  grid.innerHTML = '';

  members.forEach((m, i) => {
    const de = m.cards ? domEnergy(m.cards.energies) : 'wind';
    const col = EC[de];
    const card = document.createElement('div');
    card.className = 'member-card' + (m.name && m.date ? ' filled' : '');

    card.innerHTML = `
      <div class="mc-header">
        <div class="mc-num">${i + 1}</div>
        ${i >= 2 ? `<button class="mc-remove" onclick="removeMember(${i})" title="移除成員">✕</button>` : '<div></div>'}
      </div>
      <input class="mc-field" type="text" placeholder="姓名" value="${m.name || ''}"
             oninput="updateMember(${i}, 'name', this.value)">
      <input class="mc-field" type="date" value="${m.date || ''}"
             onchange="updateMember(${i}, 'date', this.value)">
      <select class="mc-field" onchange="updateMember(${i}, 'role', this.value)">
        ${ROLES.map(r => `<option value="${r}" ${m.role === r ? 'selected' : ''}>${r || '角色/職稱（選填）'}</option>`).join('')}
      </select>
      <div class="mc-preview ${m.cards ? 'show' : ''}" id="prev-${i}">
        ${m.cards ? buildPreview(m.cards, de, col) : ''}
      </div>`;
    grid.appendChild(card);
  });

  if (members.length < MAX_MEMBERS) {
    const slot = document.createElement('div');
    slot.className = 'add-slot';
    slot.onclick = addMember;
    slot.innerHTML = `<div class="add-slot-icon">+</div><div>新增成員</div><div style="font-size:10px;opacity:.5;margin-top:2px">最多 ${MAX_MEMBERS} 人</div>`;
    grid.appendChild(slot);
  }

  updateGenBtn();
}

function buildPreview(cards, de, col) {
  const e = cards.energies;
  const total = Object.values(e).reduce((a, b) => a + b, 1);
  const bars = ['wind','fire','water','earth'].map(k =>
    `<div class="ebar">
      <div class="el" style="color:${EC[k]}">${EN[k]}</div>
      <div class="et"><div class="ef" style="width:${e[k]/total*100}%;background:${EC[k]}"></div></div>
      <div class="ep">${Math.round(e[k]/total*100)}%</div>
    </div>`
  ).join('');
  return `
    <div style="font-size:11px;font-weight:600;color:${col};margin-bottom:5px">${ENAME[de]} · ${cards.gift}號 ${CARD_NAMES[cards.gift]}</div>
    ${bars}
    <div style="margin-top:6px">
      <span class="chip chip-gift">${cards.gift} ${CARD_NAMES[cards.gift]}</span>
      <span class="chip chip-mentor">${cards.mentor} ${CARD_NAMES[cards.mentor]}</span>
      <span class="chip chip-shadow">${cards.shadow} ${CARD_NAMES[cards.shadow]}</span>
      <span class="chip chip-year">年策 ${cards.yearStrategy}</span>
    </div>`;
}

function updateMember(i, field, val) {
  members[i][field] = val;
  if (field === 'date' && val) {
    try { members[i].cards = calcCards(val); } catch (e) { members[i].cards = null; }
  }
  renderGrid();
}

function addMember() {
  if (members.length >= MAX_MEMBERS) return;
  members.push({ name: '', date: '', role: '', cards: null });
  renderGrid();
}

function removeMember(i) {
  members.splice(i, 1);
  renderGrid();
}

function updateGenBtn() {
  const valid = members.filter(m => m.name && m.date && m.cards);
  const btn = document.getElementById('gen-btn');
  const txt = document.getElementById('gen-btn-text');
  btn.disabled = valid.length < 2;
  txt.textContent = valid.length >= 2
    ? `AI 生成合盤分析報告（${valid.length} 位成員）`
    : '請至少填入 2 位成員資料';
}

// ── Steps ──
function goStep(n) {
  document.getElementById('step1').style.display = n === 1 ? 'block' : 'none';
  document.getElementById('step2').style.display = n === 2 ? 'block' : 'none';
  document.querySelectorAll('.step-btn').forEach((b, i) => {
    b.classList.remove('active', 'done');
    if (i + 1 === n) b.classList.add('active');
    if (i + 1 < n) b.classList.add('done');
  });
  if (n === 2) window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Generate ──
async function generateReport() {
  const valid = members.filter(m => m.name && m.date && m.cards);
  if (valid.length < 2) return;

  goStep(2);
  document.getElementById('report-area').innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      AI 正在整合 MMT 知識庫，分析天賦合盤…<br>
      <span style="font-size:11px;opacity:.5;display:block;margin-top:6px">約需 10–20 秒</span>
    </div>`;

  const ctxName = document.getElementById('ctx-name').value.trim() || '團隊合盤';
  const ctxPurpose = document.getElementById('ctx-purpose').value;

  const memberSummaries = valid.map(m => {
    const c = m.cards;
    const de = domEnergy(c.energies);
    const eStr = ['wind','fire','water','earth']
      .map(k => `${EN[k]}能量 ${Math.round(c.energies[k] / Object.values(c.energies).reduce((a,b)=>a+b,1) * 100)}%`)
      .join('、');
    return `【${m.name}${m.role ? '（' + m.role + '）' : ''}】
- 出生日期：${m.date}
- 主能量：${ENAME[de]}
- 四大能量分佈：${eStr}
- 天賦牌：${c.gift}號 ${CARD_NAMES[c.gift]}──${CARD_DESC[c.gift]}
- 導師牌：${c.mentor}號 ${CARD_NAMES[c.mentor]}（需刻意練習才能發揮的潛能）
- 陰影牌：${c.shadow}號 ${CARD_NAMES[c.shadow]}（潛意識深層課題，需覺察與和解）
- 當前年度策略牌：${c.yearStrategy}號 ${CARD_NAMES[c.yearStrategy]}`;
  }).join('\n\n');

  const systemPrompt = `你是專業的 MMT 商業發展策略顧問，精通 Mercury Mental Thinking 天賦系統。
MMT 整合了畢達哥拉斯數字學、西方數據文學與榮格心理學。
四大能量：風（顧問型，知識/邏輯/創新）、水（滲透型，關係/情感/凝聚）、火（競爭型，行動/執行/業績）、土（落實型，結構/財務/穩定）。
22 張天賦牌各有獨特的行為科學特質與心智模型。
請使用「行為科學」「心智模型」「能量特質」等科學語言，嚴格避免「占星」「玄學」「命盤」等詞彙。
語氣專業、睿智、具洞察力，不說廢話，每個分析點要有實質內容。`;

  const userPrompt = `以下是「${ctxName}」${valid.length} 位成員的 MMT 資料，分析目的：${ctxPurpose}。

${memberSummaries}

請生成完整的 MMT 合盤分析報告，嚴格按以下六大區塊輸出（每區塊標題用【】包住）：

【個人天賦與職場定位分析】
針對每位成員逐一分析（用成員姓名當小標題），每人包含：
1. 核心天賦優勢（2–3 個具體優勢）
2. 導師牌潛在卡點（1 個需刻意練習的方向）
3. 陰影牌覺察提醒（1 個潛意識課題）
4. 最適職場定位建議

【團隊能量合盤（Synastry）】
分析整體能量組合的優勢特色與潛在能量缺口，說明成員間能量互補關係

【最強互為動力機制】
找出最關鍵的天賦互補對，說明如何形成飛輪效應與具體協作方式

【執行力與分工建議】
根據天賦牌特質，給出五大核心功能的具體分工建議：
- 產品結構（定義/用戶體驗/落地/迭代）
- 銷售結構（開拓/信任/業績）
- 人員結構（願景/凝聚/效率）
- 研發結構（突破/合作/實現）
- 財務結構（資金/關係/控制）

【溝通策略（理解代替忍耐）】
針對每位成員，提供如何與其他成員溝通的具體建議（換位理解彼此的底層需求差異）

【年度策略提點】
根據每人當前年度策略牌，給出本階段最重要的行動建議（1–2 句精準提點）`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 3500,
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    if (!text) throw new Error('回應內容為空');
    renderReport(valid, ctxName, ctxPurpose, text);

  } catch (err) {
    document.getElementById('report-area').innerHTML = `
      <div style="padding:1.5rem">
        <div class="error-box">
          <strong>生成失敗</strong><br>
          ${err.message}<br><br>
          請確認 API Key 正確且有餘額，然後重試。
        </div>
      </div>`;
  }
}

// ── Render Report ──
function renderReport(valid, ctxName, ctxPurpose, text) {
  const chips = valid.map(m => {
    const de = domEnergy(m.cards.energies);
    return `<div class="rh-chip"><span style="color:${EC[de]}">${ENAME[de]}</span> ${m.name}${m.role ? ' · ' + m.role : ''}</div>`;
  }).join('');

  const memberCards = valid.map(m => {
    const c = m.cards;
    const de = domEnergy(c.energies);
    const col = EC[de];
    const initials = m.name.slice(0, 2);
    const e = c.energies;
    const total = Object.values(e).reduce((a, b) => a + b, 1);
    const bars = ['wind','fire','water','earth'].map(k =>
      `<div class="ebar">
        <div class="el" style="color:${EC[k]}">${EN[k]}</div>
        <div class="et"><div class="ef" style="width:${e[k]/total*100}%;background:${EC[k]}"></div></div>
        <div class="ep">${Math.round(e[k]/total*100)}%</div>
      </div>`
    ).join('');
    return `
      <div class="mov-card">
        <div class="mov-header">
          <div class="mov-avatar" style="background:${col}22;color:${col}">${initials}</div>
          <div>
            <div class="mov-name">${m.name} <span class="chip ${ETAG_CLASS[de]}">${ENAME[de]}</span></div>
            <div class="mov-role">${m.role || '無指定角色'}</div>
          </div>
        </div>
        ${bars}
        <div style="margin-top:7px">
          <span class="chip chip-gift">${c.gift} ${CARD_NAMES[c.gift]}</span>
          <span class="chip chip-mentor">${c.mentor} ${CARD_NAMES[c.mentor]}</span>
          <span class="chip chip-shadow">${c.shadow} ${CARD_NAMES[c.shadow]}</span>
          <span class="chip chip-year">年策 ${c.yearStrategy}</span>
        </div>
      </div>`;
  }).join('');

  // Parse sections
  const sectionDefs = [
    { key: '個人天賦與職場定位分析', icon: '◉', title: '個人天賦與職場定位分析' },
    { key: '團隊能量合盤', icon: '⬡', title: '團隊能量合盤（Synastry）' },
    { key: '最強互為動力機制', icon: '⚡', title: '最強互為動力機制' },
    { key: '執行力與分工建議', icon: '◈', title: '執行力與分工建議' },
    { key: '溝通策略', icon: '◎', title: '溝通策略（理解代替忍耐）' },
    { key: '年度策略提點', icon: '◷', title: '年度策略提點' },
  ];

  function extractSection(key) {
    const pat = new RegExp(`【${key}[^】]*】\\s*([\\s\\S]*?)(?=【[^】]+】|$)`, 'i');
    const m = text.match(pat);
    return m && m[1] ? m[1].trim() : '';
  }

  let sectionsHTML = '';
  sectionDefs.forEach((s, idx) => {
    const content = extractSection(s.key);
    if (!content) return;
    const id = `sec-${idx}`;
    sectionsHTML += `
      <div class="r-section">
        <div class="r-sec-header">
          <div class="r-sec-icon">${s.icon}</div>
          <div class="r-sec-title">${s.title}</div>
        </div>
        <div class="syn-block">
          <div class="syn-content" id="${id}">${escapeHtml(content)}</div>
          <div class="syn-footer">
            <button class="edit-btn" onclick="toggleEdit('${id}', this)">✏ 編輯</button>
          </div>
        </div>
      </div>`;
  });

  if (!sectionsHTML) {
    sectionsHTML = `<div class="syn-block"><div class="syn-content">${escapeHtml(text)}</div></div>`;
  }

  document.getElementById('report-area').innerHTML = `
    <div class="report-header">
      <div class="rh-title">${escapeHtml(ctxName)} — 合盤分析報告</div>
      <div class="rh-sub">分析目的：${ctxPurpose} ｜ ${valid.length} 位成員 ｜ ${new Date().toLocaleDateString('zh-TW')}</div>
      <div class="rh-members">${chips}</div>
    </div>
    <div class="report-body">
      <div class="r-section">
        <div class="r-sec-header">
          <div class="r-sec-icon">◉</div>
          <div class="r-sec-title">成員天賦速覽</div>
        </div>
        <div class="member-overview-grid">${memberCards}</div>
      </div>
      ${sectionsHTML}
    </div>`;
}

function toggleEdit(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  if (btn.textContent.includes('編輯')) {
    const orig = el.textContent;
    el.innerHTML = `<textarea class="edit-textarea">${orig}</textarea><br><button class="save-btn" onclick="saveEdit('${id}', this)">儲存</button>`;
    btn.textContent = '✕ 取消';
  } else {
    const ta = el.querySelector('textarea');
    if (ta) el.innerHTML = escapeHtml(ta.value);
    const footer = el.parentElement.querySelector('.syn-footer');
    if (footer) footer.querySelector('.edit-btn').textContent = '✏ 編輯';
    btn.textContent = '✏ 編輯';
  }
}

function saveEdit(id, btn) {
  const el = document.getElementById(id);
  const ta = el ? el.querySelector('textarea') : null;
  if (!ta || !el) return;
  const val = ta.value;
  el.innerHTML = escapeHtml(val);
  const footer = el.parentElement.querySelector('.syn-footer .edit-btn');
  if (footer) footer.textContent = '✏ 編輯';
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
